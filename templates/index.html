<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KubeSentinel</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header>
    <h1>KubeSentinel</h1>
    <p class="tagline">
      A scanner tells you what is wrong. This tells you what to fix first —
      by gathering the live cluster context the scanner never had.
    </p>
    <p class="provider">Reasoning with <strong>{{ provider }}</strong> &middot; read-only cluster access</p>
  </header>

  <main>
    <form hx-post="/scan" hx-target="#run" hx-swap="innerHTML">
      <label for="namespaces">Namespaces to scan</label>
      <input type="text" id="namespaces" name="namespaces" value="{{ default_namespaces }}">
      <button type="submit">Scan cluster</button>
    </form>

    <div id="run"></div>
  </main>

  <footer>
    <p>KubeSentinel has read-only access. It drafts fixes; it never applies them.</p>
  </footer>
</body>
</html>
