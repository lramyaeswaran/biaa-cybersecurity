# KubeSentinel's own permissions.
#
# This is the manifest to read aloud in the workshop. The app's entire "we cannot
# change your cluster" guarantee is this file: there is no create, update, patch,
# delete, or exec verb anywhere below. The guarantee is enforced by the API server,
# not by the app's good intentions or by a prompt telling the LLM to behave.
#
# READ-ONLY IS NOT THE SAME AS HARMLESS. Say this part out loud too:
# cluster-wide `list secrets` would let this app enumerate every Secret in the
# cluster — including every ServiceAccount token — which is a path to cluster-admin
# by another name. "It's read-only" would not have saved you. So secrets are
# deliberately `get` ONLY (below): the app can fetch a Secret a scanned pod already
# references, and cannot enumerate the rest.
#
# If a scan starts failing with "cannot list resource secrets", that is this rule
# working. Fix the caller, not the rule.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesentinel
  namespace: kubesentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesentinel-readonly
rules:
  # Secrets: get ONLY. No list. See the note at the top of this file — cluster-wide
  # `list secrets` is an escalation path, not a read-only convenience.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - pods
      - services
      - serviceaccounts
      - configmaps
      - namespaces
      - nodes
      - persistentvolumes
      - persistentvolumeclaims
      - replicationcontrollers
      - limitranges
      - resourcequotas
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesentinel-readonly
subjects:
  - kind: ServiceAccount
    name: kubesentinel
    namespace: kubesentinel
roleRef:
  kind: ClusterRole
  name: kubesentinel-readonly
  apiGroup: rbac.authorization.k8s.io
